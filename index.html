<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ken's App Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #131313;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #f97316;
      --accent2: #fbbf24;
      --text: #f0ede8;
      --muted: #888;
      --danger: #ef4444;
      --green: #22c55e;
      --blue: #3b82f6;
      --purple: #a855f7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ─── HEADER ─── */
    header {
      position: relative;
      padding: 60px 48px 40px;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }

    header::after {
      content: 'KAS';
      position: absolute;
      right: -20px;
      top: -30px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 220px;
      color: #ffffff05;
      letter-spacing: -10px;
      pointer-events: none;
      user-select: none;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-eyebrow::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 2px;
      background: var(--accent);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 8vw, 100px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .header-meta {
      text-align: right;
    }

    .app-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      line-height: 1;
      color: var(--accent);
    }

    .app-count-label {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─── NAV BAR ─── */
    nav {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 48px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* ─── GRID ─── */
    .grid-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 8px 48px 80px;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ─── APP CARD ─── */
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeUp 0.4s both;
    }

    .app-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, var(--card-accent, var(--accent)) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .app-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: var(--card-accent, var(--accent));
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px var(--card-accent, var(--accent))20;
    }

    .app-card:hover::before { opacity: 0.06; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .app-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      position: relative;
      overflow: hidden;
    }

    .app-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    .status-dot.wip {
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
    }

    .status-dot.new {
      background: var(--blue);
      box-shadow: 0 0 8px var(--blue);
    }

    .app-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .app-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--card-accent, var(--accent));
      background: color-mix(in srgb, var(--card-accent, var(--accent)) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--card-accent, var(--accent)) 30%, transparent);
      padding: 4px 10px;
      border-radius: 100px;
      width: fit-content;
    }

    .app-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      font-weight: 300;
    }

    .card-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .launch-btn {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--card-accent, var(--accent));
      display: flex;
      align-items: center;
      gap: 6px;
      transition: gap 0.2s;
    }

    .app-card:hover .launch-btn { gap: 10px; }

    .launch-arrow {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--card-accent, var(--accent)) 15%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      transition: background 0.2s;
    }

    .app-card:hover .launch-arrow {
      background: var(--card-accent, var(--accent));
      color: #000;
    }

    /* ─── HERO CARD (featured) ─── */
    .app-card.featured {
      grid-column: span 2;
      flex-direction: row;
      align-items: center;
      gap: 32px;
      padding: 36px;
    }

    .app-card.featured .app-icon {
      width: 80px;
      height: 80px;
      font-size: 36px;
      flex-shrink: 0;
    }

    .app-card.featured .app-name { font-size: 40px; }

    .featured-content { flex: 1; }

    /* ─── ADD APP CARD ─── */
    .add-card {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-height: 200px;
      text-decoration: none;
    }

    .add-card:hover {
      border-color: var(--accent);
      background: rgba(249, 115, 22, 0.04);
    }

    .add-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s;
    }

    .add-card:hover .add-icon {
      border-color: var(--accent);
      color: var(--accent);
    }

    .add-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 48px;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .footer-brand span { color: var(--accent); }

    .footer-note {
      font-size: 12px;
      color: #444;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .app-card:nth-child(1) { animation-delay: 0.05s; }
    .app-card:nth-child(2) { animation-delay: 0.1s; }
    .app-card:nth-child(3) { animation-delay: 0.15s; }
    .app-card:nth-child(4) { animation-delay: 0.2s; }
    .app-card:nth-child(5) { animation-delay: 0.25s; }
    .app-card:nth-child(6) { animation-delay: 0.3s; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      transform: scale(0.95);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.open .modal { transform: scale(1); }

    .modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
      color: var(--accent);
    }

    .modal label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .modal input, .modal select, .modal textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .modal input:focus, .modal select:focus, .modal textarea:focus {
      border-color: var(--accent);
    }

    .modal select option { background: var(--surface2); }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .btn-primary {
      flex: 1;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      padding: 14px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      header, nav, .grid-wrapper, footer { padding-left: 20px; padding-right: 20px; }
      .app-card.featured { grid-column: span 1; flex-direction: column; }
      header::after { font-size: 120px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-eyebrow">Australian Portable Camps — Safety Division</div>
        <h1>Ken's<br/><span>App Store</span></h1>
      </div>
      <div class="header-meta">
        <div class="app-count" id="app-count">0</div>
        <div class="app-count-label">Applications</div>
      </div>
    </div>
  </header>

  <nav id="filter-nav">
    <button class="filter-btn active" onclick="filterApps('all', this)">All Apps</button>
    <button class="filter-btn" onclick="filterApps('safety', this)">Safety</button>
    <button class="filter-btn" onclick="filterApps('investigation', this)">Investigation</button>
    <button class="filter-btn" onclick="filterApps('admin', this)">Admin</button>
    <button class="filter-btn" onclick="filterApps('field', this)">Field Tools</button>
  </nav>

  <div class="grid-wrapper">
    <div class="apps-grid" id="apps-grid">
      <!-- Cards injected by JS -->
    </div>
  </div>

  <footer>
    <div class="footer-brand">Ken's <span>App Store</span></div>
    <div class="footer-note">Internal tools — APC Safety Division &copy; 2025</div>
  </footer>

  <!-- Add App Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Add New App</h2>

      <label>App Name</label>
      <input type="text" id="input-name" placeholder="e.g. Sign On Sheet" />

      <label>URL</label>
      <input type="url" id="input-url" placeholder="https://..." />

      <label>Description</label>
      <textarea id="input-desc" rows="2" placeholder="What does this app do?"></textarea>

      <label>Icon (emoji)</label>
      <input type="text" id="input-icon" placeholder="e.g. 📋" maxlength="2" />

      <label>Category</label>
      <select id="input-cat">
        <option value="safety">Safety</option>
        <option value="investigation">Investigation</option>
        <option value="admin">Admin</option>
        <option value="field">Field Tools</option>
      </select>

      <label>Status</label>
      <select id="input-status">
        <option value="live">Live</option>
        <option value="wip">Work in Progress</option>
        <option value="new">New</option>
      </select>

      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="addApp()">Add App</button>
      </div>
    </div>
  </div>

  <script>
    // ─── DEFAULT APPS ───
    const defaultApps = [
      {
        id: 1,
        name: "Sign On Sheet",
        url: "https://kenedwards65.github.io/apcappssignonsheets/",
        desc: "Digital site sign-on and sign-off for remote camp locations.",
        icon: "📋",
        category: "field",
        status: "live",
        accent: "#f97316"
      },
      {
        id: 2,
        name: "ICAM Investigator",
        url: "#",
        desc: "Structured incident causation analysis and contributing factor mapping.",
        icon: "🔍",
        category: "investigation",
        status: "wip",
        accent: "#a855f7"
      },
      {
        id: 3,
        name: "Bow-Tie Builder",
        url: "#",
        desc: "Visual risk bow-tie diagram generator for hazard and barrier mapping.",
        icon: "🎯",
        category: "safety",
        status: "wip",
        accent: "#ef4444"
      },
      {
        id: 4,
        name: "Risk Register",
        url: "#",
        desc: "Live risk register with consequence and likelihood matrix scoring.",
        icon: "⚠️",
        category: "safety",
        status: "wip",
        accent: "#f97316"
      },
      {
        id: 5,
        name: "Induction Tracker",
        url: "#",
        desc: "Track worker site inductions, certificates, and expiry dates.",
        icon: "🪪",
        category: "admin",
        status: "wip",
        accent: "#3b82f6"
      }
    ];

    // ─── STATE ───
    let apps = JSON.parse(localStorage.getItem('kas-apps') || 'null') || defaultApps;
    let nextId = Math.max(...apps.map(a => a.id), 0) + 1;
    let currentFilter = 'all';

    const accentMap = {
      safety: "#ef4444",
      investigation: "#a855f7",
      admin: "#3b82f6",
      field: "#f97316"
    };

    const statusLabel = { live: "Live", wip: "In Progress", new: "New" };

    // ─── SAVE ───
    function save() {
      localStorage.setItem('kas-apps', JSON.stringify(apps));
    }

    // ─── RENDER ───
    function render(filter = 'all') {
      const grid = document.getElementById('apps-grid');
      const filtered = filter === 'all' ? apps : apps.filter(a => a.category === filter);

      document.getElementById('app-count').textContent = apps.length;

      let html = filtered.map((app, i) => {
        const accent = app.accent || accentMap[app.category] || '#f97316';
        const dotClass = app.status === 'wip' ? 'wip' : app.status === 'new' ? 'new' : '';
        return `
          <a class="app-card" href="${app.url}" target="_blank" rel="noopener"
             style="--card-accent: ${accent}; animation-delay: ${i * 0.05}s">
            <div class="card-top">
              <div class="app-icon">${app.icon}</div>
              <div class="status-dot ${dotClass}" title="${statusLabel[app.status]}"></div>
            </div>
            <div>
              <div class="app-tag">${app.category}</div>
            </div>
            <div class="app-name">${app.name}</div>
            <div class="app-desc">${app.desc}</div>
            <div class="card-footer">
              <div class="launch-btn">
                Launch
                <div class="launch-arrow">→</div>
              </div>
              <div style="font-size:11px;color:#555;letter-spacing:0.05em;text-transform:uppercase">${statusLabel[app.status]}</div>
            </div>
          </a>
        `;
      }).join('');

      // Add app card
      html += `
        <div class="add-card" onclick="openModal()">
          <div class="add-icon">＋</div>
          <div class="add-label">Add New App</div>
        </div>
      `;

      grid.innerHTML = html;
    }

    // ─── FILTER ───
    function filterApps(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(cat);
    }

    // ─── MODAL ───
    function openModal() {
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('input-name').value = '';
      document.getElementById('input-url').value = '';
      document.getElementById('input-desc').value = '';
      document.getElementById('input-icon').value = '';
    }

    // Close on backdrop click
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // ─── ADD APP ───
    function addApp() {
      const name = document.getElementById('input-name').value.trim();
      const url = document.getElementById('input-url').value.trim();
      const desc = document.getElementById('input-desc').value.trim();
      const icon = document.getElementById('input-icon').value.trim() || '📦';
      const category = document.getElementById('input-cat').value;
      const status = document.getElementById('input-status').value;

      if (!name || !url) {
        alert('Name and URL are required.');
        return;
      }

      const newApp = {
        id: nextId++,
        name, url, desc, icon, category, status,
        accent: accentMap[category]
      };

      apps.push(newApp);
      save();
      closeModal();
      render(currentFilter);
    }

    // ─── INIT ───
    render();
  </script>
</body>
</html>
