<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ken's App Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #131313;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #f97316;
      --accent2: #fbbf24;
      --text: #f0ede8;
      --muted: #888;
      --danger: #ef4444;
      --green: #22c55e;
      --blue: #3b82f6;
      --purple: #a855f7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    header {
      position: relative;
      padding: 60px 48px 40px;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }

    header::after {
      content: 'KAS';
      position: absolute;
      right: -20px;
      top: -30px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 220px;
      color: #ffffff05;
      letter-spacing: -10px;
      pointer-events: none;
      user-select: none;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .brand { display: flex; flex-direction: column; gap: 4px; }

    .brand-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-eyebrow::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 2px;
      background: var(--accent);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 8vw, 100px);
      line-height: 0.9;
      letter-spacing: 0.02em;
    }

    h1 span { color: var(--accent); }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }

    .app-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      line-height: 1;
      color: var(--accent);
    }

    .app-count-label {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .admin-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.2s;
    }

    .admin-badge:hover { background: color-mix(in srgb, var(--accent) 20%, transparent); }

    .admin-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }

    .login-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 100px;
      padding: 6px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-btn:hover { border-color: var(--accent); color: var(--accent); }

    nav {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 48px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .grid-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 8px 48px 80px;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeUp 0.4s both;
    }

    .app-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, var(--card-accent, var(--accent)) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .app-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: var(--card-accent, var(--accent));
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .app-card:hover::before { opacity: 0.06; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .app-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      position: relative;
      overflow: hidden;
    }

    .app-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    }

    .card-top-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    .status-dot.wip { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
    .status-dot.new { background: var(--blue); box-shadow: 0 0 8px var(--blue); }

    .card-admin-controls { display: flex; gap: 6px; }

    .ctrl-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ctrl-btn.delete:hover { border-color: var(--danger); color: var(--danger); }

    .app-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .app-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--card-accent, var(--accent));
      background: color-mix(in srgb, var(--card-accent, var(--accent)) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--card-accent, var(--accent)) 30%, transparent);
      padding: 4px 10px;
      border-radius: 100px;
      width: fit-content;
    }

    .app-desc { font-size: 14px; color: var(--muted); line-height: 1.6; font-weight: 300; }

    .card-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .launch-btn {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--card-accent, var(--accent));
      display: flex;
      align-items: center;
      gap: 6px;
      transition: gap 0.2s;
      text-decoration: none;
    }

    .app-card:hover .launch-btn { gap: 10px; }

    .launch-arrow {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--card-accent, var(--accent)) 15%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      transition: background 0.2s;
    }

    .app-card:hover .launch-arrow { background: var(--card-accent, var(--accent)); color: #000; }

    .add-card {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-height: 200px;
    }

    .add-card:hover { border-color: var(--accent); background: rgba(249,115,22,0.04); }

    .add-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s;
    }

    .add-card:hover .add-icon { border-color: var(--accent); color: var(--accent); }
    .add-label { font-size: 13px; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 48px;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-brand { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.1em; color: var(--muted); }
    .footer-brand span { color: var(--accent); }
    .footer-note { font-size: 12px; color: #444; }

    /* ─── MODALS ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      transform: scale(0.95);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.open .modal { transform: scale(1); }

    .modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
      color: var(--accent);
    }

    .modal label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .modal input, .modal select, .modal textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--accent); }
    .modal select option { background: var(--surface2); }

    .modal-actions { display: flex; gap: 12px; margin-top: 28px; }

    .btn-primary {
      flex: 1;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      padding: 14px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 10px;
      padding: 14px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-danger:hover { background: rgba(239,68,68,0.1); }

    /* ─── PIN ─── */
    .pin-display {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 24px 0;
    }

    .pin-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .pin-dot.filled { background: var(--accent); border-color: var(--accent); }

    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 240px;
      margin: 0 auto;
    }

    .pin-key {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.05em;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      text-align: center;
    }

    .pin-key:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }
    .pin-key:active { transform: scale(0.94); }
    .pin-key.clear { color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; }
    .pin-key.enter { background: var(--accent); color: #000; border-color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.05em; }
    .pin-key.enter:hover { background: var(--accent2); border-color: var(--accent2); }

    .pin-error { text-align: center; color: var(--danger); font-size: 13px; font-weight: 500; margin-top: 12px; min-height: 20px; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .shake { animation: shake 0.4s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @media (max-width: 768px) {
      header, nav, .grid-wrapper, footer { padding-left: 20px; padding-right: 20px; }
      header::after { font-size: 120px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-eyebrow">Australian Portable Camps — Safety Division</div>
        <h1>Ken's<br/><span>App Store</span></h1>
      </div>
      <div class="header-right">
        <div style="text-align:right">
          <div class="app-count" id="app-count">0</div>
          <div class="app-count-label">Applications</div>
        </div>
        <div id="admin-status"></div>
      </div>
    </div>
  </header>

  <nav>
    <button class="filter-btn active" onclick="filterApps('all', this)">All Apps</button>
    <button class="filter-btn" onclick="filterApps('safety', this)">Safety</button>
    <button class="filter-btn" onclick="filterApps('investigation', this)">Investigation</button>
    <button class="filter-btn" onclick="filterApps('admin', this)">Admin</button>
    <button class="filter-btn" onclick="filterApps('field', this)">Field Tools</button>
  </nav>

  <div class="grid-wrapper">
    <div class="apps-grid" id="apps-grid"></div>
  </div>

  <footer>
    <div class="footer-brand">Ken's <span>App Store</span></div>
    <div class="footer-note">Internal tools — APC Safety Division &copy; 2025</div>
  </footer>

  <!-- PIN MODAL -->
  <div class="modal-overlay" id="pin-modal">
    <div class="modal" style="max-width:340px; text-align:center">
      <h2 style="text-align:center">Admin Login</h2>
      <p style="color:var(--muted);font-size:14px;margin-top:-12px">Enter your PIN to continue</p>
      <div class="pin-display" id="pin-display">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
      </div>
      <div class="pin-keypad">
        <button class="pin-key" onclick="pinKey('1')">1</button>
        <button class="pin-key" onclick="pinKey('2')">2</button>
        <button class="pin-key" onclick="pinKey('3')">3</button>
        <button class="pin-key" onclick="pinKey('4')">4</button>
        <button class="pin-key" onclick="pinKey('5')">5</button>
        <button class="pin-key" onclick="pinKey('6')">6</button>
        <button class="pin-key" onclick="pinKey('7')">7</button>
        <button class="pin-key" onclick="pinKey('8')">8</button>
        <button class="pin-key" onclick="pinKey('9')">9</button>
        <button class="pin-key clear" onclick="pinClear()">⌫ Clear</button>
        <button class="pin-key" onclick="pinKey('0')">0</button>
        <button class="pin-key enter" onclick="pinSubmit()">Enter</button>
      </div>
      <div class="pin-error" id="pin-error"></div>
      <button class="btn-secondary" style="width:100%;margin-top:16px" onclick="closePinModal()">Cancel</button>
    </div>
  </div>

  <!-- ADD / EDIT MODAL -->
  <div class="modal-overlay" id="app-modal">
    <div class="modal">
      <h2 id="modal-title">Add New App</h2>
      <input type="hidden" id="edit-id" value="" />
      <label>App Name</label>
      <input type="text" id="input-name" placeholder="e.g. Sign On Sheet" />
      <label>URL</label>
      <input type="url" id="input-url" placeholder="https://..." />
      <label>Description</label>
      <textarea id="input-desc" rows="2" placeholder="What does this app do?"></textarea>
      <label>Icon (emoji)</label>
      <input type="text" id="input-icon" placeholder="e.g. 📋" maxlength="2" />
      <label>Category</label>
      <select id="input-cat">
        <option value="safety">Safety</option>
        <option value="investigation">Investigation</option>
        <option value="admin">Admin</option>
        <option value="field">Field Tools</option>
      </select>
      <label>Status</label>
      <select id="input-status">
        <option value="live">Live</option>
        <option value="wip">Work in Progress</option>
        <option value="new">New</option>
      </select>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeAppModal()">Cancel</button>
        <button class="btn-primary" id="modal-save-btn" onclick="saveApp()">Add App</button>
      </div>
    </div>
  </div>

  <!-- DELETE CONFIRM MODAL -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal" style="max-width:400px">
      <h2 style="color:var(--danger)">Delete App</h2>
      <p style="color:var(--muted);font-size:15px;line-height:1.6">Are you sure you want to delete <strong id="delete-app-name" style="color:var(--text)"></strong>? This cannot be undone.</p>
      <div class="modal-actions" style="margin-top:28px">
        <button class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    // ── SET YOUR PIN HERE ──
    const ADMIN_PIN = '1234';

    const defaultApps = [
      { id:1, name:"Sign On Sheet",    url:"https://kenedwards65.github.io/apcappssignonsheets/", desc:"Digital site sign-on and sign-off for remote camp locations.",                    icon:"📋", category:"field",         status:"live", accent:"#f97316" },
      { id:2, name:"ICAM Investigator",url:"#",                                                    desc:"Structured incident causation analysis and contributing factor mapping.",         icon:"🔍", category:"investigation", status:"wip",  accent:"#a855f7" },
      { id:3, name:"Bow-Tie Builder",  url:"#",                                                    desc:"Visual risk bow-tie diagram generator for hazard and barrier mapping.",           icon:"🎯", category:"safety",        status:"wip",  accent:"#ef4444" },
      { id:4, name:"Risk Register",    url:"#",                                                    desc:"Live risk register with consequence and likelihood matrix scoring.",              icon:"⚠️", category:"safety",        status:"wip",  accent:"#f97316" },
      { id:5, name:"Induction Tracker",url:"#",                                                    desc:"Track worker site inductions, certificates, and expiry dates.",                  icon:"🪪", category:"admin",         status:"wip",  accent:"#3b82f6" }
    ];

    let apps          = JSON.parse(localStorage.getItem('kas-apps') || 'null') || defaultApps;
    let nextId        = Math.max(...apps.map(a => a.id), 0) + 1;
    let currentFilter = 'all';
    let isAdmin       = false;
    let pinEntry      = '';
    let deleteTarget  = null;

    const accentMap   = { safety:"#ef4444", investigation:"#a855f7", admin:"#3b82f6", field:"#f97316" };
    const statusLabel = { live:"Live", wip:"In Progress", new:"New" };

    function save() { localStorage.setItem('kas-apps', JSON.stringify(apps)); }

    // ── RENDER ──
    function render(filter = 'all') {
      const grid     = document.getElementById('apps-grid');
      const filtered = filter === 'all' ? apps : apps.filter(a => a.category === filter);
      document.getElementById('app-count').textContent = apps.length;

      let html = filtered.map((app, i) => {
        const accent   = app.accent || accentMap[app.category] || '#f97316';
        const dotClass = app.status === 'wip' ? 'wip' : app.status === 'new' ? 'new' : '';
        const controls = isAdmin ? `
          <div class="card-admin-controls">
            <button class="ctrl-btn"        onclick="openEditModal(${app.id});event.stopPropagation()" title="Edit">✏️</button>
            <button class="ctrl-btn delete" onclick="openDeleteModal(${app.id});event.stopPropagation()" title="Delete">🗑️</button>
          </div>` : '';
        return `
          <div class="app-card" style="--card-accent:${accent};animation-delay:${i*0.05}s">
            <div class="card-top">
              <div class="app-icon">${app.icon}</div>
              <div class="card-top-right">
                ${controls}
                <div class="status-dot ${dotClass}" title="${statusLabel[app.status]}"></div>
              </div>
            </div>
            <div><div class="app-tag">${app.category}</div></div>
            <div class="app-name">${app.name}</div>
            <div class="app-desc">${app.desc}</div>
            <div class="card-footer">
              <a class="launch-btn" href="${app.url}" target="_blank" rel="noopener">
                Launch <div class="launch-arrow">→</div>
              </a>
              <div style="font-size:11px;color:#555;letter-spacing:0.05em;text-transform:uppercase">${statusLabel[app.status]}</div>
            </div>
          </div>`;
      }).join('');

      if (isAdmin) html += `
        <div class="add-card" onclick="openAddModal()">
          <div class="add-icon">＋</div>
          <div class="add-label">Add New App</div>
        </div>`;

      grid.innerHTML = html;
      renderAdminBadge();
    }

    function renderAdminBadge() {
      const el = document.getElementById('admin-status');
      el.innerHTML = isAdmin
        ? `<div class="admin-badge" onclick="logoutAdmin()"><div class="dot"></div>Admin — Click to Logout</div>`
        : `<button class="login-btn" onclick="openPinModal()">Admin Login</button>`;
    }

    function filterApps(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(cat);
    }

    // ── PIN ──
    function openPinModal() {
      pinEntry = '';
      updateDots();
      document.getElementById('pin-error').textContent = '';
      document.getElementById('pin-modal').classList.add('open');
    }

    function closePinModal() {
      document.getElementById('pin-modal').classList.remove('open');
      pinEntry = '';
      updateDots();
    }

    function pinKey(d) {
      if (pinEntry.length >= 4) return;
      pinEntry += d;
      updateDots();
      if (pinEntry.length === 4) setTimeout(pinSubmit, 150);
    }

    function pinClear() { pinEntry = pinEntry.slice(0,-1); updateDots(); }

    function updateDots() {
      for (let i = 0; i < 4; i++)
        document.getElementById(`dot-${i}`).classList.toggle('filled', i < pinEntry.length);
    }

    function pinSubmit() {
      if (pinEntry === ADMIN_PIN) {
        isAdmin = true;
        closePinModal();
        render(currentFilter);
      } else {
        document.getElementById('pin-error').textContent = 'Incorrect PIN. Try again.';
        const d = document.getElementById('pin-display');
        d.classList.remove('shake');
        void d.offsetWidth;
        d.classList.add('shake');
        pinEntry = '';
        updateDots();
      }
    }

    function logoutAdmin() { isAdmin = false; render(currentFilter); }

    // ── APP MODAL ──
    function openAddModal() {
      document.getElementById('modal-title').textContent    = 'Add New App';
      document.getElementById('modal-save-btn').textContent = 'Add App';
      document.getElementById('edit-id').value              = '';
      ['input-name','input-url','input-desc','input-icon'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('input-cat').value    = 'safety';
      document.getElementById('input-status').value = 'live';
      document.getElementById('app-modal').classList.add('open');
    }

    function openEditModal(id) {
      const app = apps.find(a => a.id === id);
      if (!app) return;
      document.getElementById('modal-title').textContent    = 'Edit App';
      document.getElementById('modal-save-btn').textContent = 'Save Changes';
      document.getElementById('edit-id').value              = id;
      document.getElementById('input-name').value           = app.name;
      document.getElementById('input-url').value            = app.url;
      document.getElementById('input-desc').value           = app.desc;
      document.getElementById('input-icon').value           = app.icon;
      document.getElementById('input-cat').value            = app.category;
      document.getElementById('input-status').value         = app.status;
      document.getElementById('app-modal').classList.add('open');
    }

    function closeAppModal() { document.getElementById('app-modal').classList.remove('open'); }

    function saveApp() {
      const name     = document.getElementById('input-name').value.trim();
      const url      = document.getElementById('input-url').value.trim();
      const desc     = document.getElementById('input-desc').value.trim();
      const icon     = document.getElementById('input-icon').value.trim() || '📦';
      const category = document.getElementById('input-cat').value;
      const status   = document.getElementById('input-status').value;
      const editId   = document.getElementById('edit-id').value;

      if (!name || !url) { alert('Name and URL are required.'); return; }

      if (editId) {
        const idx = apps.findIndex(a => a.id === parseInt(editId));
        if (idx > -1) apps[idx] = { ...apps[idx], name, url, desc, icon, category, status, accent: accentMap[category] };
      } else {
        apps.push({ id: nextId++, name, url, desc, icon, category, status, accent: accentMap[category] });
      }

      save();
      closeAppModal();
      render(currentFilter);
    }

    // ── DELETE ──
    function openDeleteModal(id) {
      const app = apps.find(a => a.id === id);
      if (!app) return;
      deleteTarget = id;
      document.getElementById('delete-app-name').textContent = app.name;
      document.getElementById('delete-modal').classList.add('open');
    }

    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.remove('open');
      deleteTarget = null;
    }

    function confirmDelete() {
      if (deleteTarget === null) return;
      apps = apps.filter(a => a.id !== deleteTarget);
      save();
      closeDeleteModal();
      render(currentFilter);
    }

    // Backdrop close
    ['app-modal','delete-modal'].forEach(id => {
      document.getElementById(id).addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('open');
      });
    });

    render();
  </script>
</body>
</html>
